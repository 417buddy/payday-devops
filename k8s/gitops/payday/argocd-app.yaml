apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: payday-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mykaelHunter/payday-devops.git
    targetRevision: main
    path: payday-api

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
