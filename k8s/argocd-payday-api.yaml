# argocd/payday-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payday-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mykaelHunter/payday-devops
    targetRevision: main
    path: k8s/helm/payday-api
  destination:
    server: https://kubernetes.default.svc
    namespace: payday
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
