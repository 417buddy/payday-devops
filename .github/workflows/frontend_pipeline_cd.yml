name: Payday CI/CD Frontend Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'payday-devops/app/frontend/**'
      - '.github/workflows/frontend_pipeline_cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'payday-devops/app/frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/payday-app
  CLUSTER_NAME: payday-cluster
  AWS_REGION: us-east-2

jobs:
  # 🔒 SECURITY & QUALITY GATES
  test-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # For CodeQL/SARIF
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (example app)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: payday-devops/app/frontend/package-lock.json

      - name: Install dependencies & run tests
        run: |
          npm ci
          npm run test:unit
          npm run test:integration

      - name: Run SAST (CodeQL)
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

      - name: Build Docker image (multi-stage)
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -f Dockerfile.prod .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Fail pipeline on critical/high CVEs

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Sign image with Cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign --yes \
            -a "github_actor=${{ github.actor }}" \
            -a "run_id=${{ github.run_id }}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # 🚀 DEPLOYMENT PIPELINE
  deploy-staging:
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    permissions:
      contents: read
      id-token: write # For OIDC to AWS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update Helm values for staging
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' \
            charts/payday/values-staging.yaml

      - name: Commit GitOps manifest (Argo CD auto-sync)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update staging image to ${{ github.sha }}"
          file_pattern: 'charts/payday/values-staging.yaml'
          branch: gitops-main

  # 🎯 PRODUCTION PROMOTION (Manual Approval + Canary)
  promote-to-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production # Requires manual approval in GitHub UI
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}-gitops
          ref: gitops-main
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Update production Helm values
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' \
            charts/payday/values-prod.yaml

      - name: Trigger Argo CD sync for production
        uses: argoproj/argo-cd-action@v0.4.0
        with:
          server: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          app: payday-payments-app-prod
          command: app sync --prune

      - name: Wait for canary analysis (Argo Rollouts)
        run: |
          # Poll rollout status until stable or failed
          for i in {1..30}; do
            STATUS=$(kubectl get rollout payday-payments-app-prod -n prod -o jsonpath='{.status.phase}')
            if [ "$STATUS" = "Healthy" ]; then
              echo "✅ Canary promotion successful"
              exit 0
            elif [ "$STATUS" = "Degraded" ]; then
              echo "❌ Canary failed - triggering auto-rollback"
              kubectl argo rollouts abort payday-payments-app-prod -n prod
              exit 1
            fi
            sleep 30
          done
          echo "⏰ Timeout waiting for canary"
          exit 1
