name: Payday CI/CD Frontend Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'payday-devops/app/frontend/**'
      - '.github/workflows/frontend_pipeline_cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'payday-devops/app/frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/payday-app
  CLUSTER_NAME: payday-eks
  AWS_REGION: us-east-2

jobs:
  # 🔒 SECURITY, QUALITY GATES & BUILD
  test-and-scan-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # For CodeQL/SARIF
      packages: write        # Required to push to GHCR
      id-token: write        # Required for Cosign keyless signing
    outputs:
      image_name_lower: ${{ steps.downcase.outputs.lowercase }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Solves scope issue: Convert to lowercase and store as an output AND env
      - name: Downcase regional variables for Docker
        id: downcase
        run: |
          LOWEST=${IMAGE_NAME,,}
          echo "lowercase=${LOWEST}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME_LOWER=${LOWEST}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Setup Node.js (example app)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: payday-devops/app/frontend/package-lock.json

      - name: Install dependencies & run tests
        working-directory: payday-devops/app/frontend
        run: |
          npm ci
          npm run test
          npm run lint

      - name: Run SAST (CodeQL)
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

      - name: Build Docker image (multi-stage)
        working-directory: payday-devops/app/frontend
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest \
            -f Dockerfile.prod .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # Fail pipeline on critical/high CVEs

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # Log in and push here because the built image lives on THIS runner VM
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

      - name: Sign image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3
      - name: Sign Docker Image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            -a "github_actor=${{ github.actor }}" \
            -a "run_id=${{ github.run_id }}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

  # 🚀 DEPLOYMENT PIPELINE (STAGING)
  deploy-staging:
    needs: test-and-scan-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    permissions:
      contents: write # Needed for auto-commit back to the branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Helm values for staging
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' \
            charts/payday/values-staging.yaml

      - name: Commit GitOps manifest (Argo CD auto-sync)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update staging image to ${{ github.sha }}"
          file_pattern: 'charts/payday/values-staging.yaml'

  # 🎯 PRODUCTION PROMOTION (Manual Approval + Canary)
  promote-to-prod:
    needs: test-and-scan-build # Crucial Fix: Depend on build, not deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production # Requires manual approval in GitHub UI
    permissions:
      contents: read
      id-token: write # For OIDC to AWS

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc
          aws-region: ${{ env.AWS_REGION }}

      # Authenticate kubectl against your EKS cluster
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Deploy to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
           --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
           --insecure --grpc-web
          argocd app sync payday-app
          argocd app wait payday-app --health

      # Install Argo Rollouts CLI plugin for kubectl fallback logic
      - name: Install Argo Rollouts CLI
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      - name: Update production Helm values
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' \
            k8s/helm/payday-app/values.yaml

      # 👇 ADDED THIS STEP: Actually save the changes back to your GitOps repository!
      - name: Commit and Push GitOps Manifest changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(prod): promote image tag to ${{ github.sha }}"
          file_pattern: 'k8s/helm/payday-app/values.yaml'
          branch: gitops-main
      # Because we checked out with a custom token, this action natively uses it to push back


      - name: Trigger Argo CD sync for production
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
           --auth-token ${{ secrets.ARGOCD_TOKEN }} \
           --insecure --grpc-web
          argocd app sync payday-app --prune

      - name: Wait for canary analysis (Argo Rollouts)
        run: |
          # Poll rollout status until stable or failed using the installed plugin
          for i in {1..30}; do
            STATUS=$(kubectl get rollout payday-app -n prod -o jsonpath='{.status.phase}')
            echo "Current Canary Status: $STATUS"
            if [ "$STATUS" = "Healthy" ]; then
              echo "✅ Canary promotion successful"
              exit 0
            elif [ "$STATUS" = "Degraded" ]; then
              echo "❌ Canary failed - triggering auto-rollback"
              kubectl argo rollouts abort payday-app-prod -n prod
              exit 1
            fi
            sleep 30
          done
          echo "⏰ Timeout waiting for canary"
          exit 1

