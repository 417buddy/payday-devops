name: Payday CI/CD Backend Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'payday-devops/app/backend/**'
      - '.github/workflows/backend_pipeline_cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'payday-devops/app/backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/payday-api
  CLUSTER_NAME: payday-eks
  AWS_REGION: us-east-2
  PYTHON_VERSION: '3.13'
  WORKING_DIR: payday-devops/app/backend

jobs:
  # ==========================================
  # [SECURITY, QUALITY GATES, BUILD & PUSH]
  # ==========================================
  test-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # REQUIRED: To push to GHCR
      security-events: write # For CodeQL/SARIF
      id-token: write       # REQUIRED: For Cosign keyless signing

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payday_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase regional variables for Docker
        run: |
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.WORKING_DIR }}/requirements-dev.txt'

      - name: Install dependencies (dev + app)
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ run.py --max-line-length=120 --exclude=__pycache__,migrations --extend-ignore=F821

      - name: Run tests with pytest + coverage
        run: |
          coverage run -m pytest app/tests/ -v --tb=short
          coverage report --fail-under=70
          coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.WORKING_DIR }}/coverage.xml

      - name: Run SAST (CodeQL)
        uses: github/codeql-action/init@v3
        with:
          languages: python
          source-root: ${{ env.WORKING_DIR }}

      - uses: github/codeql-action/analyze@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and Push Docker Image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Sign image with Cosign (keyless)
        uses: sigstore/cosign-installer@v3

      - name: Sign the published Docker image
        run: |
          cosign sign --yes \
            -a "github_actor=${{ github.actor }}" \
            -a "run_id=${{ github.run_id }}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

  # ==========================================
  # [DEPLOYMENT PIPELINE - STAGING]
  # ==========================================
  deploy-staging:
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    permissions:
      contents: write
      id-token: write # For OIDC to AWS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig Context
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Update Helm values for staging
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' \
            charts/payday-api/values-staging.yaml

      - name: Commit GitOps manifest (Argo CD auto-sync)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update backend staging image to ${{ github.sha }}"
          file_pattern: 'charts/payday-api/values-staging.yaml'
          branch: gitops-main

      - name: Wait for Argo CD staging sync
        uses: argoproj/argo-cd-action@v0.4.0
        with:
          server: ${{ secrets.ARGOCD_SERVER }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          app: payday-api-staging
          command: app wait --health --timeout 120

      - name: Smoke test staging - /health & /ready
        run: |
          echo "Smoke testing ${{ secrets.STAGING_API_URL }}"
          curl --fail --silent "${{ secrets.STAGING_API_URL }}/health" \
            | jq -e '.status == "ok"'
          curl --fail --silent "${{ secrets.STAGING_API_URL }}/ready" \
            | jq -e '.ready == true'

  # ==========================================
  # [PRODUCTION PROMOTION - Manual Approval + Canary]
  # ==========================================
  promote-to-prod:
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Downcase image name
        run: |
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig Context
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Deploy to ArgoCD
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_OPTS: "--insecure --grpc-web"
        run: |
          argocd app sync payday-api
          argocd app wait payday-api --health

      - name: Update production Helm values
        run: |
          yq -i '.image.tag = "${{ github.sha }}"' \
            k8s/helm/payday-api/values.yaml

      - name: Commit updated production manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: promote backend to prod - ${{ github.sha }}"
          file_pattern: 'k8s/helm/payday-app/values.yaml'
          branch: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Argo CD sync for production
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_OPTS: "--insecure --grpc-web"
        run: |
          argocd app sync payday-api --prune

      - name: Install Argo Rollouts CLI Plugin
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts
          sudo mv ./kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts

      - name: Wait for canary analysis (Argo Rollouts)
        run: |
          for i in {1..30}; do
            STATUS=$(kubectl get rollout payday-api -n prod -o jsonpath='{.status.phase}')
            echo "Current Canary Status: $STATUS"
            if [ "$STATUS" = "Healthy" ]; then
              echo "Canary promotion successful"
              exit 0
            elif [ "$STATUS" = "Degraded" ]; then
              echo "Canary failed - triggering auto-rollback"
              kubectl argo rollouts abort payday-api -n prod
              exit 1
            fi
            sleep 30
          done
          echo "Timeout waiting for canary"
          exit 1

      - name: Notify deployment status
        if: always()
        run: |
          STATUS=${{ job.status }}
          echo "Backend prod deployment finished with status: $STATUS"

